<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Generator / Beta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EEEADE;
    --ink: #1a1a18;
    --ink2: #5a5a52;
    --ink3: #9a9a8e;
    --border: rgba(26,26,24,0.13);
    --border2: rgba(26,26,24,0.28);
    --input-bg: rgba(255,255,255,0.55);
    --input-focus: rgba(255,255,255,0.85);
    --result-bg: rgba(255,255,255,0.65);
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  .page {
    max-width: 780px;
    margin: 0 auto;
    padding: 56px 40px 100px;
  }
  .header-eyebrow {
    font-size: 11px;
    letter-spacing: .17em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 14px;
    font-weight: 400;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    font-weight: 400;
    line-height: 1.05;
    color: var(--ink);
  }
  .header-title .beta {
    color: var(--ink3);
    font-style: italic;
  }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 36px 0 52px;
  }
  .section { margin-bottom: 48px; }
  .sec-num {
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--ink3);
    margin-bottom: 11px;
  }
  .sec-label {
    font-size: 20px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 20px;
    letter-spacing: -.01em;
  }
  input[type=text], textarea {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    outline: none;
    transition: background .2s, border-color .2s;
    -webkit-appearance: none;
  }
  input[type=text]::placeholder, textarea::placeholder { color: var(--ink3); }
  input[type=text]:focus, textarea:focus {
    background: var(--input-focus);
    border-color: var(--border2);
  }
  textarea { min-height: 130px; resize: vertical; line-height: 1.65; }
  .pills { display: flex; flex-wrap: wrap; gap: 10px; }
  .pill {
    cursor: pointer;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    padding: 9px 22px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    color: var(--ink2);
    background: transparent;
    transition: all .18s;
    user-select: none;
  }
  .pill:hover { border-color: var(--ink); color: var(--ink); }
  .pill.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .style-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 10px;
  }
  .style-card {
    cursor: pointer;
    padding: 15px 17px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--input-bg);
    transition: all .18s;
  }
  .style-card:hover { border-color: var(--border2); background: var(--input-focus); }
  .style-card.active { border-color: var(--ink); background: var(--input-focus); }
  .sc-code {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .sc-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 3px;
    line-height: 1.3;
  }
  .sc-desc { font-size: 11px; color: var(--ink3); line-height: 1.45; }
  .gen-btn {
    width: 100%;
    padding: 18px;
    border-radius: var(--radius);
    border: none;
    background: var(--ink);
    color: var(--bg);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    letter-spacing: .02em;
    cursor: pointer;
    transition: opacity .2s;
    margin-top: 8px;
  }
  .gen-btn:hover { opacity: .82; }
  .gen-btn:disabled { opacity: .35; cursor: not-allowed; }
  .result-wrap { margin-top: 56px; display: none; }
  .result-wrap.show { display: block; }
  .result-eyebrow {
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 16px;
  }
  .result-box {
    background: var(--result-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 36px;
  }
  .result-content {
    font-size: 14px;
    line-height: 1.95;
    color: var(--ink);
    white-space: pre-wrap;
    font-family: 'DM Sans', sans-serif;
  }
  .result-actions { display: flex; gap: 12px; margin-top: 24px; }
  .action-btn {
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 10px 22px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--ink2);
    cursor: pointer;
    transition: all .18s;
  }
  .action-btn:hover { border-color: var(--ink); color: var(--ink); }
  .action-btn.primary {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }
  .action-btn.primary:hover { opacity: .8; }
  .loading-row {
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--ink3);
    font-size: 14px;
    padding: 6px 0;
  }
  .dot-pulse { display: flex; gap: 5px; }
  .dot-pulse span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--ink3);
    animation: pulse 1.2s infinite;
  }
  .dot-pulse span:nth-child(2) { animation-delay: .2s; }
  .dot-pulse span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:1} }
  .error-box {
    display: none;
    margin-top: 14px;
    padding: 14px 18px;
    border-radius: var(--radius);
    background: rgba(180,60,60,.08);
    border: 1px solid rgba(180,60,60,.2);
    color: #8b3333;
    font-size: 13px;
    line-height: 1.6;
  }
  @media(max-width:600px){
    .page { padding: 36px 20px 80px; }
    .header-title { font-size: 36px; }
    .style-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header-eyebrow">AI Media Content Creation</div>
  <h1 class="header-title">Script Generator <span class="beta">/ Beta</span></h1>
  <div class="divider"></div>

  <div class="section">
    <div class="sec-num">01</div>
    <div class="sec-label">品牌 / 個人名稱</div>
    <input type="text" id="cname" placeholder="例：One Bite、丁丁、Hilary Travels">
  </div>

  <div class="section">
    <div class="sec-num">02</div>
    <div class="sec-label">行業 / 類型</div>
    <div class="pills" id="ind-pills">
      <div class="pill active" data-v="飲食">飲食</div>
      <div class="pill" data-v="旅遊">旅遊</div>
      <div class="pill" data-v="美妝">美妝</div>
      <div class="pill" data-v="活動">活動</div>
      <div class="pill" data-v="好物分享">好物分享</div>
      <div class="pill" data-v="生活">生活</div>
      <div class="pill" data-v="文化">文化</div>
      <div class="pill" data-v="科技">科技</div>
    </div>
  </div>

  <div class="section">
    <div class="sec-num">03</div>
    <div class="sec-label">主題</div>
    <input type="text" id="topic" placeholder="例：最強宵夜滷肉飯？全世界最靚聖誕市集？">
  </div>

  <div class="section">
    <div class="sec-num">04</div>
    <div class="sec-label">請提供完整背景資料</div>
    <textarea id="bg" placeholder="例：係老字號，成立1920年，主打豬油糕同老婆餅。近排被香港KOL大量推介，排隊人龍長達一小時。網上評價兩極，有人話係情懷多過實力..."></textarea>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="sec-num">05</div>
    <div class="sec-label">Hook 風格</div>
    <div class="style-grid" id="hook-grid"></div>
  </div>

  <div class="section">
    <div class="sec-num">06</div>
    <div class="sec-label">轉場風格</div>
    <div class="style-grid" id="trans-grid"></div>
  </div>

  <div class="section">
    <div class="sec-num">07</div>
    <div class="sec-label">Ending 風格</div>
    <div class="style-grid" id="end-grid"></div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generate()">生成 Script</button>
  <div class="error-box" id="error-box"></div>

  <div class="result-wrap" id="result-wrap">
    <div class="result-eyebrow" id="result-eyebrow"></div>
    <div class="result-box">
      <div id="result-inner"></div>
    </div>
    <div class="result-actions">
      <button class="action-btn primary" onclick="copyScript()">複製 Script</button>
      <button class="action-btn" onclick="generate()">重新生成</button>
    </div>
  </div>

</div>

<script>
const HOOKS = [
  {c:"H1",n:"極端行動質問",d:"誇張行為/處境問觀眾"},
  {c:"H2",n:"真定假 — 直接挑戰",d:"質疑廣泛聲稱，邀請驗證"},
  {c:"H3",n:"聽講 — 半信半疑",d:"借第三者說法引入懸念"},
  {c:"H4",n:"感官喚起 + 懸念",d:"啟動感官記憶再拋轉折"},
  {c:"H5",n:"反差驚喜 — 竟然",d:"意想不到對比，情緒跳躍"},
  {c:"H6",n:"意外自我披露",d:"個人資訊拉近距離"},
  {c:"H7",n:"荒誕事實",d:"真實但匪夷所思，引發驚訝"},
  {c:"H8",n:"代入感假設",d:"「如果」句式直問觀眾"},
];
const TRANS = [
  {c:"T1",n:"情緒代入 — 同行感",d:"主持緊張，拉觀眾入狀態"},
  {c:"T2",n:"轉念 — 入去先信咗",d:"懷疑被現實正面打臉"},
  {c:"T3",n:"質疑名氣 — 實力存疑",d:"對名氣打預防針"},
  {c:"T4",n:"實測宣言 — 等我試下",d:"宣佈「我幫你試」"},
  {c:"T5",n:"場景切割 — 另有真相",d:"意想不到角度重新定義"},
  {c:"T6",n:"第一印象反轉",d:"坦白第一眼唔吸引"},
  {c:"T7",n:"靈魂轉移 — 重點喺呢度",d:"真正精華喺另一樣"},
  {c:"T8",n:"頓悟時刻",d:"具體動作到情感領悟"},
];
const ENDS = [
  {c:"E1",n:"留白式 Verdict",d:"坦白收，短句，唔誇張"},
  {c:"E2",n:"值唔值得 — 親身作答",d:"回應開場，直接給答案"},
  {c:"E3",n:"情懷翻轉 — 真材實料",d:"老字號靠真實力"},
  {c:"E4",n:"自嘲收尾 — 解鎖",d:"輕鬆收，帶幽默"},
  {c:"E5",n:"詩意留白",d:"短句節奏，情緒拉遠"},
  {c:"E6",n:"個人感悟 — 超越食玩",d:"升華到人生意義"},
  {c:"E7",n:"哲學收結",d:"最有重量，適合文化類"},
];

let selH = "H1", selT = "T1", selE = "E1", scriptText = "";

function renderGrid(id, arr, getSel, setSel) {
  const g = document.getElementById(id);
  g.innerHTML = "";
  arr.forEach(x => {
    const d = document.createElement("div");
    d.className = "style-card" + (x.c === getSel() ? " active" : "");
    d.innerHTML = `<div class="sc-code">${x.c}</div><div class="sc-name">${x.n}</div><div class="sc-desc">${x.d}</div>`;
    d.onclick = () => { setSel(x.c); renderGrid(id, arr, getSel, setSel); };
    g.appendChild(d);
  });
}

function init() {
  renderGrid("hook-grid", HOOKS, () => selH, v => { selH = v; });
  renderGrid("trans-grid", TRANS, () => selT, v => { selT = v; });
  renderGrid("end-grid", ENDS, () => selE, v => { selE = v; });
  document.querySelectorAll("#ind-pills .pill").forEach(p => {
    p.onclick = () => {
      document.querySelectorAll("#ind-pills .pill").forEach(x => x.classList.remove("active"));
      p.classList.add("active");
    };
  });
}

function getInd() {
  return document.querySelector("#ind-pills .pill.active")?.dataset.v || "飲食";
}

function buildSystem() {
  return `你係廣東話短片 script 寫手，幫 content creator 寫 IG Reel / YouTube Short。
廣東話口語，短句，坦白，唔oversell，每句有目的。

結構：
1.【Opening Hook】一句，5秒
2.【背景 VO】80-100字
3.【轉場】一句，10秒
4.【實測內容】4項，每項：名稱、拍攝提示、旁白1-2句
5.【Ending】一句5秒＋主持1-2句感想

Hook：H1誇張行為問觀眾｜H2挑戰廣泛聲稱｜H3借第三者引懸念｜H4感官記憶+轉折｜H5意外對比｜H6個人披露｜H7荒誕事實｜H8如果句式
轉場：T1主持緊張同行｜T2懷疑被打臉｜T3對名氣存疑｜T4宣佈親自試｜T5意外角度｜T6第一眼唔吸引｜T7重點係另一樣｜T8動作到領悟
Ending：E1坦白留白｜E2直接回應開場｜E3真實力｜E4自嘲幽默｜E5詩意短句｜E6升華人生｜E7哲學重量

飲食：VO名氣+賣點+質疑。實測招牌食物，旁白口感質地味道。
旅遊：VO歷史場景氣氛。實測景點，旁白感受文化。
美妝：VO品牌賣點場合。實測產品，旁白質地效果持久。
好物分享：VO發現+定位+好奇。實測功能，旁白效果改變。
其他：VO賣點懸念。實測重點。

輸出格式：

【Opening Hook】
（一句）

【背景 VO】
（80-100字）

【轉場】
（一句）

【實測內容】
1. 名稱
   拍攝：
   旁白：

2. 名稱
   拍攝：
   旁白：

3. 名稱
   拍攝：
   旁白：

4. 名稱
   拍攝：
   旁白：

【Ending】
（一句）
＋ 主持1-2句感想`;
}

async function generate() {
  const topic = document.getElementById("topic").value.trim();
  if (!topic) { document.getElementById("topic").focus(); return; }

  const cname = document.getElementById("cname").value.trim();
  const bg = document.getElementById("bg").value.trim();
  const ind = getInd();
  const h = HOOKS.find(x => x.c === selH);
  const t = TRANS.find(x => x.c === selT);
  const e = ENDS.find(x => x.c === selE);

  const btn = document.getElementById("gen-btn");
  const wrap = document.getElementById("result-wrap");
  const inner = document.getElementById("result-inner");
  const eyebrow = document.getElementById("result-eyebrow");
  const errBox = document.getElementById("error-box");

  btn.disabled = true;
  errBox.style.display = "none";
  wrap.className = "result-wrap show";

  const meta = [cname, ind, topic].filter(Boolean).join("  ·  ");
  eyebrow.textContent = meta;
  inner.innerHTML = `<div class="loading-row"><div class="dot-pulse"><span></span><span></span><span></span></div><span>正在生成，約需 15 秒...</span></div>`;

  const userMsg = `${cname ? `品牌：${cname}\n` : ""}類型：${ind}
主題：${topic}
${bg ? `背景資料：${bg}\n` : ""}Hook：${h.c}｜轉場：${t.c}｜Ending：${e.c}

請即刻輸出完整 script，唔好加前言。`;

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        system: buildSystem(),
        messages: [{ role: "user", content: userMsg }]
      })
    });

    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(j?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    scriptText = data.content?.[0]?.text || "";
    if (!scriptText.trim()) throw new Error("生成內容為空，請重試。");

    inner.innerHTML = `<div class="result-content">${esc(scriptText)}</div>`;

  } catch (err) {
    inner.innerHTML = "";
    errBox.textContent = "出現錯誤：" + err.message;
    errBox.style.display = "block";
    wrap.className = "result-wrap";
  }

  btn.disabled = false;
}

function copyScript() {
  if (!scriptText) return;
  navigator.clipboard.writeText(scriptText).catch(() => {});
  const b = document.querySelector(".action-btn.primary");
  b.textContent = "已複製！";
  setTimeout(() => { b.textContent = "複製 Script"; }, 2000);
}

function esc(t) {
  return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

init();
</script>
</body>
</html>
